# アイキャッチ画像のテンプレート方式(依頼: AIによる人物画像の大量生成は行わない)。
#
# ここではテンプレートIDと見出しの組み合わせ(メタデータ)のみを定義・生成する。
# 実画像の生成・合成(テンプレート画像に見出しを重ねてPNG化する処理)は未実装。
# 画像が無くても記事投稿は止まらない設計(赤羽がメタデータを生成するだけ)。
#
# カテゴリーごとに使うテンプレートを固定する。将来的にテンプレート画像
# (背景デザイン)を用意する際は、このIDに対応する画像を1枚ずつ用意すればよい。
templates:
  地域情報: local-community
  勉強のコツ: study-tips
  入試情報: exam-info
  保護者コラム: parent-column
