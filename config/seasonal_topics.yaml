# 日付範囲(publish_window)を持つ季節テーマ候補バンク。
#
# config/calendar.yaml の `seasons`(月単位の粗い季節文脈)とは別に、
# 「この期間だけ旬」なテーマを厳密な日付範囲で管理するための新規ファイル。
# 智谷(planner-blog-btoc)がこのファイルを読み、当日が publish_window に
# 含まれるテーマの中から優先度順に企画候補として検討する(エージェント統合は次段階)。
#
# 各フィールド:
#   id: 一意なID(fallback_topic_idの参照先としても使う)
#   title: テーマ(タイトル案そのものではなく企画の切り口)
#   category: 地域情報/勉強のコツ/入試情報/保護者コラム のいずれか
#   target: elementary_parent / junior_high_parent の配列(両方可)
#   keywords.primary: メイン検索キーワード
#   keywords.secondary: サブ検索キーワード
#   publish_window: このテーマが「旬」である期間(この期間外には投稿しない)
#   priority: 同一期間内での優先度(高いほど優先。0-100の目安)
#   locality_required: 地域固有名詞(守山区・小幡等)への言及が必須か
#   school_name_required: 具体的な学校名への言及が必須か
#   episode_preferred: episodes.md/parent_qa.mdの実話素材を優先的に使うべきか
#   fallback_topic_id: 期限切れ・素材不足時に差し替える代替テーマのID(なければnull)
#   allowed_cta: この記事末尾に使ってよいCTA種別(id一覧はREADME参照)
#   season_dependency: high(旬を過ぎたら価値が下がる)/medium/low

