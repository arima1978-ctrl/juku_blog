# 競合キーワード分析(Keyword Gap Lite)の競合塾レジストリ。
# features.competitor_keyword_analysis.crawl_enabled が有効な場合のみ使用される。
#
# scripts/seo_competitor_crawl.js がこのファイルを読み、登録済みドメインのみを
# SSRF対策・robots.txt尊重・レート制限つきで取得する(未登録ドメインは取得しない)。
# コード変更なしで追加・削除・無効化ができるよう、すべてここに集約する。
#
# 各フィールド:
#   id: 一意なID
#   name: 競合塾名(記事本文へは出さない。ダッシュボード上の根拠表示にのみ使う)
#   domain: 許可ドメイン判定に使うホスト名
#   start_url: 内部リンク探索の起点URL(sitemap_url が無い場合のフォールバック)
#   sitemap_url: sitemap.xml / sitemap index のURL(あれば最優先で使う)
#   competitor_type: local/major_chain/exam_specialist/subject_specialist/information_media/other
#   target_areas: 対象地域(自社エリアとの関連性スコアに使う)
#   target_schools: 対象校区(学校名)
#   target_grades: 対象学年
#   target_subjects: 対象教科
#   crawl_enabled: falseにすると取得対象から除外(削除せず一時停止する場合に使う)
#   crawl_interval_days: 何日おきに再取得するか
#   max_pages: このサイトから取得する最大ページ数(config/juku.yaml の
#     seo.competitor_analysis.max_pages_per_site が既定値、ここで上書き可能)
#
# 初期状態では競合未登録(空配列)。安全のため、実際に登録・確認するまで
# crawl_enabled: true の競合は追加しない運用とする。

competitors:
  - id: plabo
    name: "個別指導塾PLABO"
    domain: "pbstudy.jp"
    sitemap_url: "https://pbstudy.jp/sitemap.xml"
    # 2026-07-13確認: 名古屋圏だけでなく福岡・札幌・熊本等にも校舎を持つ多拠点チェーン
    competitor_type: major_chain
    target_areas: ["守山区", "小幡"]
    crawl_enabled: true
    crawl_interval_days: 7
    max_pages: 40

  - id: morikobe
    name: "守山個別塾 モリコベ！"
    domain: "www.morikobe.com"
    start_url: "https://www.morikobe.com/"
    # sitemap.xmlの記載無し(2026-07-13確認)。単一教室のためstart_urlからの内部リンク探索で足りる
    competitor_type: local
    target_areas: ["守山区", "小幡"]
    crawl_enabled: true
    crawl_interval_days: 7
    max_pages: 20
