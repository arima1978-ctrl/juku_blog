juku:
  name: "アンイングリッシュグループ 小幡校"     # 実データ(2026-07-06 WebSearch/WebFetchで確認)
  brand_voice: "親しみやすく誠実。専門用語を避け、保護者の不安に寄り添う"
  cta_url: "https://an-english.com/school/obata/"   # 教室紹介ページ(体験授業専用ページ未確認のため暫定。確定次第差し替え)
  line_url: ""                  # LINE登録URL(未確認)
  # 記事内容に応じてCTAの文言を切り替える(URLは専用ページが未確認のため現状すべてcta_urlと同じ。
  # 専用ページが用意でき次第、各typeのurlに個別のURLを設定する)
  cta_types:
    trial_lesson:
      label: "体験授業のお申込みはこちら"
      url: null   # nullの場合はcta_urlを使う
    learning_consultation:
      label: "学習相談のご予約はこちら"
      url: null
    school_tour:
      label: "教室見学のお申込みはこちら"
      url: null
    summer_course_info:
      label: "夏期講習の詳細はこちら"
      url: null
    course_consultation:
      label: "進路・学習相談のご予約はこちら"
      url: null
area:
  prefecture: "愛知県"
  city: "名古屋市守山区"
  neighborhoods: ["小幡", "中新", "瓢箪山"]  # 瓢箪山は実際のブログ(an-english.com/author/13/)で頻出する対の地名として追加
  elementary_schools: ["守山小学校", "西城小学校", "二城小学校", "鳥羽見小学校", "小幡小学校", "苗代小学校", "廿軒家小学校", "千代田橋小学校"]
  junior_high_schools: ["守山中学校", "守山東中学校", "守山西中学校", "守山北中学校"]
  target_high_schools: ["名古屋高等学校", "名古屋市立名東高校", "愛知県立千種高等学校", "愛知県立旭野高等学校"]
  # 2026-07-06 ユーザー指示により変更: 偏差値55未満の公立高校名(愛知県立守山高等学校、偏差値40)は
  # 「馬鹿が行く塾という印象を持たれる」ため掲載禁止。minkou.jp基準で偏差値55以上の学校のみ掲載する。
  # 名古屋高等学校(私立,偏差値64-66)/名古屋市立名東高校(公立,偏差値63)/愛知県立千種高等学校(公立,偏差値63-67)。
  # 出典: https://www.minkou.jp/hischool/ranking/deviation/pref=aichi/ (2026-07-06確認)
targets:
  grades: ["小1", "小2", "小3", "小4", "小5", "小6", "中1", "中2", "中3"]  # 実際は年少〜高校生対象だが、ブログの主読者は小中学生保護者に絞る
author:                          # 塾長ペルソナ(実在の方。未確認の個人的詳細は暫定値のためユーザー確認が必要)
  name: "米澤 由里子"            # 実データ(WebFetch確認済み: an-english.com/school/obata/)
  title: "塾長"
  teaching_years: null           # 未確認。ユーザーに要確認(記事中で具体的な年数を断定しない)
  subjects: ["個別指導(アン進学ジム)", "英会話(アンイングリッシュクラブ)"]  # 教室が提供する主なコース(実データ)。得意科目は未確認
  background: ""                 # 未確認。具体的な経歴を断定的に書かない(石橋がチェックする対象)
  personality: "親しみやすく、生徒一人ひとりに寄り添うタイプ。実際の保護者連絡(LINE)からも、生徒の努力を具体的に褒めつつ次の目標を示す、成長志向の声かけスタイルが確認できている"
  first_person: "私"
  tone_notes: |
    - 保護者には敬体(です・ます)で、同じ子育て世代・教育者としての目線で語る
    - 断定しすぎず「〜だと私は考えています」「教室で見ていて感じるのは」等、経験に基づく語り口
    - 実在の人物のため、確認が取れていない具体的な経歴・指導年数・個人的エピソードは記事内で断定しない(一般論として書く)
    - 【実際のブログ(an-english.com/author/13/)で確認された実際のトーン】敬体をベースにしつつ、絵文字(♡🥵😭等)を要所で使うカジュアルで親近感のある口調。「〜ですね」「〜でした!」等の軽快な語尾も多い
    - 実在ブログでの決まり文句(冒頭挨拶): 「個別指導学習塾・アン進学ジム小幡教室塾長の米澤です。」
    - 【実際の保護者向けLINE連絡(2026-07-07確認、data/parent_qa.md参照)で確認できたスタイル】結果を素直に褒めた上で「もっと上を目指せる」と次の具体的な目標を示す、褒める+伸ばすの二段構え。教科ごとに良い点と改善点を具体的に伝える(例: 「文構成は良いが単語のスペルがもったいない」)。テスト前は無理な追い込みより体調(睡眠)を気遣う一言を添える
  signature_phrases:
    - "個別指導学習塾・アン進学ジム小幡教室塾長の米澤です。"  # 実際のブログ冒頭で使われている定型句(2026-07-06 an-english.com/author/13/で確認)
generation:
  daily_count: 1
  run_time: "05:00"
  max_retry: 2
  # 過去記事との類似度チェック(scripts/lib/similarity.js)の閾値(0〜1)。
  # いずれか1つでも閾値以上ならis_duplicate=trueと判定する。
  duplicate_threshold:
    title: 0.8
    headings: 0.75
    body: 0.7
  # 予約投稿時の連続性チェック(scripts/lib/schedule.js)。ブロックはせず警告のみ
  # (人間が内容を見て判断できるようにするため)。
  max_same_category_streak: 2   # 同じカテゴリーが何日連続まで許容か
  max_same_audience_streak: 3   # 同じ対象読者(target_audience)が何日連続まで許容か
features:
  # 愛知県高校入試 情報ソース参照機能(config/aichi_exam_sources.yaml)。
  # false(既定)の間は fetch_exam_research.js が即座に無処理で終了し、
  # 既存の記事生成フローには一切影響しない。
  aichi_exam_research:
    enabled: false
  # 競合キーワード分析(Keyword Gap Lite, config/seo_competitors.yaml)。
  # enabled: false(既定)の間は seo_*.js が即座に無処理で終了し、
  # 既存の記事生成フロー・DB・ダッシュボード・WordPress投稿には一切影響しない。
  competitor_keyword_analysis:
    enabled: false
    # true でも、候補は表示されるだけで智谷(planner-blog-btoc)の企画には自動採用されない。
    # 人間がダッシュボードで承認(approved)した候補のみ企画候補として使われる。
    use_for_topic_selection: false
    # 競合サイトの実クロールを行うか(false のままなら手動登録データ・CSV取込のみで運用可能)
    crawl_enabled: false
    # Google Search Console API連携を行うか
    search_console_enabled: false
  # AI Growth Director(SEO Task生成・Opportunity Score・改善提案画面)。
  # enabled: false(既定)の間は seo_task_generate.js が即座に無処理で終了し、
  # 既存の記事生成フロー・競合キーワード分析(candidates)には一切影響しない。
  # 記事生成パイプライン(daily_blog.sh)・WordPress投稿へは今回一切接続しない(Sprint 1)。
  growth_director:
    enabled: false

# 競合キーワード分析(Keyword Gap Lite)専用パラメータ。
# 値をコード内にハードコードせず、すべてここで調整可能にする。
seo:
  competitor_analysis:
    max_pages_per_site: 100
    request_interval_ms: 3000
    request_timeout_ms: 15000
    max_retries: 2
    minimum_priority_score: 70
    data_retention_days: 365
    user_agent: "JukuBlogSEOResearchBot/1.0 (+https://an-english.com/school/obata/)"
    # HTML抽出時のキーワード重み(title/見出し/本文のどこに出現したかで重みづけ)
    extraction_weights:
      title: 5
      h1: 5
      h2: 3
      h3: 2
      meta_description: 2
      body: 1
    # 優先度スコア(0〜100)の内訳配点
    priority_score_weights:
      area_relevance: 25
      inquiry_intent: 25
      competitor_adoption: 15
      competitor_rank: 10
      search_demand: 10
      own_rank_improvement: 10
      seasonality: 5

  # AI Growth Director(features.growth_director)専用パラメータ。
  growth_director:
    # Opportunity Score(0〜100)の内訳配点。priority_scoreとは完全に独立したスコア。
    opportunity_score_weights:
      competitor_adoption: 20
      area_relevance: 20
      search_intent: 20
      own_coverage_gap: 20
      data_confidence: 10
      effort_efficiency: 10
    # task_type別の見積り工数(分)。実際の作業時間の目安が変わった場合はここを調整する。
    effort_minutes_by_task_type:
      add_faq: 5
      add_internal_links: 5
      improve_school_page: 10
      improve_existing_article: 15
      create_article: 30
      monitor: 0
      exclude: 0

wordpress:
  # an-english.com は教室ごとに同名の子カテゴリー(コラム/学校情報/教室の様子等)が
  # 並ぶ構造のため、名前ではなくIDで固定指定する。
  # 2026-07-10 確認: 「小幡教室用のカテゴリー」(school13, ID=139) > 「コラム」(ID=263)
  category_id: 263
  # 投稿前検証用(scripts/lib/wordpress_validation.js): 「教室からのBLOG」一覧が
  # 投稿者IDで絞り込まれているため、想定と異なるアカウントで誤って投稿しないよう
  # 認証中ユーザーがこのID・表示名と一致するか毎回確認する。
  # 2026-07-10 確認: 米澤塾長の実アカウント(ID=13、表示名を「米澤由里子」に設定変更済み)
  author_id: 13
  author_display_name: "米澤由里子"

