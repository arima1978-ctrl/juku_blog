juku:
  name: "瀬戸学習塾"                # 塾名(プレースホルダー。実運用前に差し替え)
  brand_voice: "親しみやすく誠実。専門用語を避け、保護者の不安に寄り添う"
  cta_url: "https://example.com/taiken"   # 体験授業申込ページ
  line_url: ""                  # LINE登録URL(あれば)
area:
  prefecture: "愛知県"
  city: "瀬戸市"
  neighborhoods: ["西陵町", "南山口町"]      # 商圏の地名(プレースホルダー)
  elementary_schools: ["瀬戸市立西陵小学校"]
  junior_high_schools: ["瀬戸市立西陵中学校"]
  target_high_schools: ["愛知県立瀬戸窯業高校", "愛知県立瀬戸北総合高校"]    # 地域の人気進学先(プレースホルダー)
targets:
  grades: ["小4", "小5", "小6", "中1", "中2", "中3"]
author:                          # ブログの書き手=塾長のペルソナ
  name: "山田 太郎"              # 塾長名(プレースホルダー、記事の署名に使用)
  title: "塾長"
  teaching_years: 20             # 指導歴
  subjects: ["数学", "理科"]     # 得意科目(一人称の専門的な語りに使う)
  background: "地元瀬戸市立西陵中学校出身。大手塾で10年勤務後、地元で開塾"  # 経歴(自己開示に使う、プレースホルダー)
  personality: "熱血だが押し付けない。生徒の小さな変化を見逃さないタイプ"
  first_person: "私"             # 一人称(私/僕 など)
  tone_notes: |
    - 保護者には敬体(です・ます)で、同じ子育て世代・教育者としての目線で語る
    - 断定しすぎず「〜だと私は考えています」「教室で見ていて感じるのは」等、経験に基づく語り口
    - たまに軽いユーモアや自虐を入れる(例:「私も中学生の頃は〜でした」)
  signature_phrases: []          # 塾長がよく使う口癖・決まり文句があれば登録
generation:
  daily_count: 1                # 1日の生成本数
  run_time: "05:00"             # 生成バッチの起動時刻
  max_retry: 2                  # 石橋(verifier-local)差し戻し時の最大リトライ回数
