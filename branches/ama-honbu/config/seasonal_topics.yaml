# 日付範囲(publish_window)を持つ季節テーマ候補バンク。あま本部教室(branch_id=2、
# slug=ama-honbu、塾長: 山口誠司)向け。
#
# 【由来・調査根拠】
# - 7/11〜8/31部分は小幡校config/seasonal_topics.yamlの構造をベースに、地域固有の
#   3件(moriyama-summer-course-tips/local-junior-high-second-term-test-prep/
#   moriyama-junior-high-juku-selection)をあま市版に置き換えたもの(*_ama という
#   idを付与)。それ以外の項目は地域非依存のため小幡校版と実質同一(季節は校舎に
#   依らず共通の学校暦であるため)。
# - 9月以降は新規作成(小幡校版は2026-07-17時点で7/11〜8/31のみのため、通年化にあたり
#   1年分の残り10か月をこのファイルで新規に補完した)。
# - あま市の実在校名: あま本部教室ページ(an-english.com/school/ama-honbu/)記載の
#   対応学区と、あま市公式サイトの小中学校一覧(city.ama.aichi.jp)の両方で確認できた
#   校名のみを使用: 小学校=美和/正則/篠田/美和東/伊福/甚目寺/甚目寺南/甚目寺東/甚目寺西、
#   中学校=美和/七宝/甚目寺/甚目寺南(いずれも2026-07-17 WebFetch確認)。
# - あま本部教室ページに記載のあった「大治/千代田/大里/供米田」の学校名は、あま市公式サイトの
#   一覧に含まれず(隣接する大治町の学校の可能性が高い)、独立した2件目の情報源で確認できて
#   いないため今回は使用していない。実在確認が取れ次第、追加を検討されたい。
# - 高校名: あま本部教室の「指導実績校」欄(an-english.com/school/ama-honbu/、2026-07-17 WebFetch確認)
#   に記載があり、かつみんなの高校情報(minkou.jp)で偏差値55以上を確認できた3校のみ使用:
#   愛知県立五条高等学校(公立、58)/愛知県立津島高等学校(公立、56)/
#   名城大学附属高等学校(私立、56〜66)。指導実績校欄にあった津島東高校(49)・愛知黎明高校(40-48)は
#   偏差値55未満のため除外、清林館高校は大半のコース(46〜54)が基準未満のため除外(文理特進コースのみ58)。
#   小幡校版が「みんなの高校情報基準・偏差値55以上のみ」という同一ルールで選定されている
#   ことに倣った(2026-07-06ユーザー指示と同じ基準を適用)。
# - キーワード候補: 2026-07-17の週次バッチ(seo_gap_calculate.js)で実際に算出された
#   あま本部校のGapキーワード4件(あま市 塾/あま市 個別指導/あま市 集団指導/
#   あま市 高校入試、いずれもbranch_id=2)を、該当するテーマのkeywords.primary/secondary
#   に反映した(下記の各エントリのコメントに反映元candidate_idの根拠を明記)。
#
# 各フィールドの意味は小幡校版と同じ(README/config/seasonal_topics.yaml参照)。

